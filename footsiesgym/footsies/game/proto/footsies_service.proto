syntax = "proto3";


service FootsiesGameService {
    rpc StartGame(Empty) returns (Empty) {}
    rpc ResetGame(Empty) returns (Empty) {}
    rpc StepNFrames(StepInput) returns (GameState) {}
    rpc GetState(Empty) returns (GameState) {}
    rpc GetEncodedState(Empty) returns (EncodedGameState) {}
    rpc IsReady(Empty) returns (BoolValue) {}
}

service VectorizedFootsiesService {
    rpc InitEnvironments(InitEnvironmentsRequest) returns (Empty) {}
    rpc BatchStep(BatchStepInput) returns (BatchEncodedState) {}
    rpc BatchReset(BatchResetInput) returns (BatchEncodedState) {}
    rpc BatchResetAll(Empty) returns (BatchEncodedState) {}
    rpc IsVecReady(Empty) returns (BoolValue) {}
}


message StepInput {
    int64 p1_action = 1;
    int64 p2_action = 2;
    int64 nFrames = 3;
}

message PlayerState {
    float player_position_x = 1;
    bool is_dead = 2;
    int64 vital_health = 3;
    int64 guard_health = 4;
    int64 current_action_id = 5;
    int64 current_action_frame = 6;
    int64 current_action_frame_count = 7;
    bool is_action_end = 8;
    bool is_always_cancelable = 9;
    int64 current_action_hit_count = 10;
    int64 current_hit_stun_frame = 11;
    bool is_in_hit_stun = 12;
    int64 sprite_shake_position = 13;
    int64 max_sprite_shake_frame = 14;
    float velocity_x = 15;
    bool is_face_right = 16;
    repeated int64 input_buffer = 17;
    int64 current_frame_advantage = 18;
    bool would_next_forward_input_dash = 19;
    bool would_next_backward_input_dash = 20;
    float special_attack_progress = 21;
}

message GameState {
    PlayerState player1 = 1;
    PlayerState player2 = 2;
    int64 round_state = 3;
    int64 frame_count = 4;
}

message EncodedGameState {
    repeated float player1_encoding = 1;
    repeated float player2_encoding = 2;
}

message InitEnvironmentsRequest {
    int64 num_environments = 1;
}

message BatchStepInput {
    repeated int64 p1_actions = 1;
    repeated int64 p2_actions = 2;
    int64 n_frames = 3;
}

message BatchResetInput {
    repeated bool reset_mask = 1;
}

message BatchEncodedState {
    // Common fields
    repeated int64 round_states = 3;
    repeated bool dones = 4;
    repeated int32 rewards = 5;
    repeated int64 frame_counts = 6;

    // P1 state arrays (each length num_envs)
    repeated float p1_position_x = 7;
    repeated bool p1_is_dead = 8;
    repeated int64 p1_vital_health = 9;
    repeated int64 p1_guard_health = 10;
    repeated int64 p1_current_action_id = 11;
    repeated int64 p1_current_action_frame = 12;
    repeated int64 p1_current_action_frame_count = 13;
    repeated bool p1_is_action_end = 14;
    repeated bool p1_is_always_cancelable = 15;
    repeated int64 p1_current_action_hit_count = 16;
    repeated int64 p1_current_hit_stun_frame = 17;
    repeated bool p1_is_in_hit_stun = 18;
    repeated int64 p1_sprite_shake_position = 19;
    repeated int64 p1_max_sprite_shake_frame = 20;
    repeated float p1_velocity_x = 21;
    repeated bool p1_is_face_right = 22;
    repeated int64 p1_current_frame_advantage = 23;
    repeated bool p1_would_next_forward_input_dash = 24;
    repeated bool p1_would_next_backward_input_dash = 25;
    repeated float p1_special_attack_progress = 26;

    // P2 state arrays (each length num_envs)
    repeated float p2_position_x = 27;
    repeated bool p2_is_dead = 28;
    repeated int64 p2_vital_health = 29;
    repeated int64 p2_guard_health = 30;
    repeated int64 p2_current_action_id = 31;
    repeated int64 p2_current_action_frame = 32;
    repeated int64 p2_current_action_frame_count = 33;
    repeated bool p2_is_action_end = 34;
    repeated bool p2_is_always_cancelable = 35;
    repeated int64 p2_current_action_hit_count = 36;
    repeated int64 p2_current_hit_stun_frame = 37;
    repeated bool p2_is_in_hit_stun = 38;
    repeated int64 p2_sprite_shake_position = 39;
    repeated int64 p2_max_sprite_shake_frame = 40;
    repeated float p2_velocity_x = 41;
    repeated bool p2_is_face_right = 42;
    repeated int64 p2_current_frame_advantage = 43;
    repeated bool p2_would_next_forward_input_dash = 44;
    repeated bool p2_would_next_backward_input_dash = 45;
    repeated float p2_special_attack_progress = 46;
}

message BoolValue {
    bool value = 1;
}

message Empty {}
