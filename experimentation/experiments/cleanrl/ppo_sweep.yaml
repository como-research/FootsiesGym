program: train_ppo.py
command:
  - ${env}
  - python
  - -m
  - experimentation.experiments.cleanrl.train_ppo
  - ${args}
method: bayes
metric:
  name: eval/win_rate_vs_random
  goal: maximize
parameters:
  # PPO
  learning_rate:
    values:
      - .0001
      - .0003
      - .0006
      - .001
  ent_coef:
    values:
      - 0.0
      - 0.01
      - 0.025
      - 0.05
      - 0.1
      - 0.25
      - 0.5
      - 1.0
  gamma:
    values:
      - 0.99
      - 0.995
  gae_lambda:
    values:
      - 0.9
      - 0.95
      - 0.99
  clip_coef:
    values:
      - 0.1
      - 0.2
      - 0.3
  vf_coef:
    values:
      - 0.5
      - 1.0
  num_minibatches:
    values:
      - 4
      - 8
  update_epochs:
    values:
      - 4
      - 8
  anneal_lr:
    values:
      - true
      - false
  anneal_ent:
    values:
      - true
      - false
  num_steps:
    values:
      - 128
      - 256
      - 512
      - 1024
      - 2048
  # Network
  hidden_size:
    values:
      - 64
      - 128
      - 256
